name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ===========================================================================
  # Build native libraries for each platform
  # ===========================================================================

  build-linux:
    name: Build (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libgmp-dev

      - name: Build KAZ-KEM shared library
        run: |
          cd KEM/bindings/dotnet/scripts
          chmod +x build-native.sh
          OUTPUT_DIR=/tmp/kem-linux ./build-native.sh

      - name: Build KAZ-SIGN shared library
        working-directory: SIGN
        run: |
          make shared-unified
          mkdir -p /tmp/sign-linux
          cp build/lib/libkazsign.so /tmp/sign-linux/

      - name: Test KAZ-KEM
        working-directory: KEM
        run: make test-all

      - name: Test KAZ-SIGN
        working-directory: SIGN
        run: make test-all

      - name: Package Linux artifacts
        run: |
          mkdir -p dist
          tar czf dist/kaz-kem-linux-x64.tar.gz -C /tmp/kem-linux .
          tar czf dist/kaz-sign-linux-x64.tar.gz -C /tmp/sign-linux .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: dist/

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install openssl@3 gmp

      - name: Build KAZ-KEM shared library
        run: |
          cd KEM/bindings/dotnet/scripts
          chmod +x build-native.sh
          OUTPUT_DIR=/tmp/kem-macos ./build-native.sh

      - name: Build KAZ-SIGN shared library
        working-directory: SIGN
        run: |
          make shared-unified
          mkdir -p /tmp/sign-macos
          cp build/lib/libkazsign.dylib /tmp/sign-macos/

      - name: Test KAZ-KEM
        working-directory: KEM
        run: make test-all

      - name: Test KAZ-SIGN
        working-directory: SIGN
        run: make test-all

      - name: Package macOS artifacts
        run: |
          mkdir -p dist
          tar czf dist/kaz-kem-macos-arm64.tar.gz -C /tmp/kem-macos .
          tar czf dist/kaz-sign-macos-arm64.tar.gz -C /tmp/sign-macos .

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/

  build-rust:
    name: Build Rust crates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev libgmp-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3 gmp

      - uses: dtolnay/rust-toolchain@stable

      - name: Build and test KAZ-KEM Rust
        working-directory: KEM/bindings/rust
        run: cargo test --release

      - name: Build and test KAZ-SIGN Rust
        working-directory: SIGN/bindings/rust
        run: cargo test --release

  # ===========================================================================
  # Create GitHub Release
  # ===========================================================================

  release:
    name: Create Release
    needs: [build-linux, build-macos, build-rust]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "PQC-KAZ $TAG" \
            --generate-notes \
            artifacts/linux-x64/*.tar.gz \
            artifacts/macos-arm64/*.tar.gz
