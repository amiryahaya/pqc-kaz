# Prometheus Configuration for IdP Development
# Docs: https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  scrape_interval: 15s          # How often to scrape targets
  evaluation_interval: 15s       # How often to evaluate rules
  scrape_timeout: 10s           # Timeout for scraping

  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager).
  external_labels:
    environment: 'development'
    service: 'idp-platform'

# Alertmanager configuration (optional for dev)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (optional for dev)
# rule_files:
#   - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # =============================================================================
  # Prometheus self-monitoring
  # =============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # =============================================================================
  # IdP API - Main Application
  # =============================================================================
  - job_name: 'idp-api'
    static_configs:
      - targets: ['host.docker.internal:5000']
    metrics_path: /metrics
    scheme: http
    scrape_interval: 10s
    # Add labels to identify the service
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'idp-api'

  # =============================================================================
  # PostgreSQL Exporter (if using postgres_exporter)
  # =============================================================================
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # =============================================================================
  # Redis Exporter (if using redis_exporter)
  # =============================================================================
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # =============================================================================
  # Jaeger metrics
  # =============================================================================
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
    metrics_path: /metrics

  # =============================================================================
  # Grafana metrics
  # =============================================================================
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics
