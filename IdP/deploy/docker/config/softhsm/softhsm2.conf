# SoftHSM v2 Configuration
# Docs: https://www.opendnssec.org/softhsm/

# Directories for token storage
directories.tokendir = /var/lib/softhsm/tokens/

# Object store backend (file or db)
objectstore.backend = file

# Log level (ERROR, WARNING, INFO, DEBUG)
log.level = INFO

# Slots configuration
# Slot 0 will be initialized by init script
slots.removable = false
slots.mechanisms = ALL
