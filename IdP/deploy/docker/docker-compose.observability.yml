# PQC Identity Platform - Observability Stack
# Usage: docker-compose -f docker-compose.yml -f docker-compose.observability.yml up -d
# Or standalone: docker-compose -f docker-compose.observability.yml up -d

name: idp-dev

services:
  # =============================================================================
  # Jaeger - Distributed Tracing
  # UI: http://localhost:16686
  # =============================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: idp-jaeger
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"       # Jaeger UI
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"  # OTLP gRPC
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"  # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      # Use in-memory storage for development (simpler, no persistence needed)
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=10000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - idp-network

  # =============================================================================
  # Prometheus - Metrics Collection
  # UI: http://localhost:9090
  # =============================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: idp-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - idp-network

  # =============================================================================
  # Grafana - Dashboards & Visualization
  # UI: http://localhost:3000 (admin/admin)
  # =============================================================================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: idp-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - idp-network

  # =============================================================================
  # Seq - Structured Log Management
  # UI: http://localhost:8081
  # Ingestion: http://localhost:5341
  # =============================================================================
  seq:
    image: datalust/seq:2024.3
    container_name: idp-seq
    restart: unless-stopped
    ports:
      - "${SEQ_UI_PORT:-8081}:80"      # Web UI
      - "${SEQ_INGEST_PORT:-5341}:5341" # Ingestion API
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - idp-network

  # =============================================================================
  # OpenTelemetry Collector (Optional - for advanced routing)
  # =============================================================================
  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:0.91.0
  #   container_name: idp-otel-collector
  #   restart: unless-stopped
  #   command: ["--config=/etc/otel-collector-config.yml"]
  #   ports:
  #     - "4317:4317"   # OTLP gRPC
  #     - "4318:4318"   # OTLP HTTP
  #     - "8888:8888"   # Prometheus metrics
  #   volumes:
  #     - ./config/otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
  #   networks:
  #     - idp-network

# =============================================================================
# Networks
# =============================================================================
networks:
  idp-network:
    name: idp-network
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  prometheus-data:
    name: idp-prometheus-data
  grafana-data:
    name: idp-grafana-data
  seq-data:
    name: idp-seq-data
